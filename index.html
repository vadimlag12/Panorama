<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Продвинутая Сшивка Панорамы</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0d0d11; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none; -webkit-user-select: none; color: #fff;
        }
        #camera-feed {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;
        }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;
        }
        #hints-layout {
            position: absolute; top: 6%; left: 0; width: 100%; display: flex; justify-content: center; z-index: 3;
        }
        #hints {
            background: rgba(20, 20, 25, 0.9); color: #fff; padding: 12px 24px;
            border-radius: 50px; font-size: 1rem; text-align: center; font-weight: 600;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
        }
        #start-screen, #result-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #141419; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; text-align: center; padding: 30px; box-sizing: border-box;
        }
        #result-screen { 
            background: #09090b; display: none; z-index: 15; overflow-y: auto; pointer-events: auto;
        }
        .btn {
            padding: 16px 36px; font-size: 1rem; background: #007AFF; color: white;
            border: none; border-radius: 30px; margin-top: 20px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.35); transition: transform 0.1s, background 0.2s;
        }
        .btn:active { transform: scale(0.96); }
        .btn-success { background: #34c759; box-shadow: 0 4px 15px rgba(52, 199, 89, 0.35); }
        .btn-danger { background: #ff3b30; box-shadow: 0 4px 15px rgba(255, 59, 48, 0.3); }

        #recenter-btn {
            position: absolute; bottom: 35px; right: 25px; padding: 12px 20px;
            background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px; font-size: 0.85rem; z-index: 4; cursor: pointer; pointer-events: auto;
            backdrop-filter: blur(10px); display: none;
        }
        #finish-early-btn {
            position: absolute; bottom: 35px; left: 25px; padding: 12px 20px;
            border: none; border-radius: 20px; font-size: 0.85rem; z-index: 4; cursor: pointer; pointer-events: auto;
            display: none; font-weight: bold;
        }
        .progress-bar {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
            color: white; font-size: 0.9rem; background: rgba(10,10,12,0.85); padding: 12px 22px;
            border-radius: 50px; z-index: 3; font-weight: 600; border: 1px solid rgba(255,255,255,0.1);
        }
        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 100; opacity: 0; pointer-events: none;
        }
        #output-image {
            max-width: 95%; max-height: 60%; border-radius: 8px; box-shadow: 0 12px 40px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline muted></video>
    <canvas id="ui-layer"></canvas>
    <div id="flash"></div>

    <div id="hints-layout">
        <div id="hints" style="display: none;">Инициализация...</div>
    </div>
    
    <div class="progress-bar" id="progress" style="display: none;">0 / 38 КАДРОВ</div>
    <button id="recenter-btn">🔄 Сбросить</button>
    <button id="finish-early-btn" class="btn-success">🎯 Склеить сейчас</button>

    <div id="start-screen">
        <h2 style="margin-bottom: 8px; font-size: 1.5rem;">Умная Панорама 360°</h2>
        <p style="color: #8e8e93; max-width: 290px; font-size: 0.9rem; line-height: 1.5; margin: 0 0 20px 0;">
            Плотная сетка захвата. Вы можете прервать съёмку и склеить полученные кадры в любой момент.
        </p>
        <button class="btn" id="start-btn">Запустить камеру</button>
    </div>

    <div id="result-screen">
        <h2 style="margin-top: 0; font-size: 1.4rem;">Готовая панорама</h2>
        <p style="color: #8e8e93; font-size: 0.85rem; margin-top: 0;">Зажмите пальцем изображение, чтобы сохранить в галерею</p>
        <img id="output-image" alt="Панорамный снимок">
        <button class="btn btn-danger" id="restart-btn">Снять заново</button>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const recenterBtn = document.getElementById('recenter-btn');
        const finishEarlyBtn = document.getElementById('finish-early-btn');
        const restartBtn = document.getElementById('restart-btn');
        const startScreen = document.getElementById('start-screen');
        const resultScreen = document.getElementById('result-screen');
        
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('ui-layer');
        const ctx = canvas.getContext('2d');
        const hints = document.getElementById('hints');
        const progressEl = document.getElementById('progress');
        const flashEl = document.getElementById('flash');
        const outputImage = document.getElementById('output-image');

        // Буферный canvas для мгновенного захвата текстуры
        const grabCanvas = document.createElement('canvas');
        const grabCtx = grabCanvas.getContext('2d');

        let currentIndex = 0;
        let isCapturing = false;
        let isStitching = false;
        
        let baseMatrix = null;
        let currentMatrix = null;
        let targets = [];

        const sphereLayers = [
            { pitch: 0, steps: 12 },   
            { pitch: 35, steps: 9 },   
            { pitch: -35, steps: 9 },  
            { pitch: 70, steps: 4 },   
            { pitch: -70, steps: 4 }   
        ];

        let renderX = 0, renderY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Безопасный запуск медиапотока и датчиков
        startBtn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    await DeviceOrientationEvent.requestPermission();
                } catch (e) { console.log("Датчики заблокированы или не поддерживаются:", e); }
            }

            // Конфигурация для мобильных устройств с фолбеком
            const options = { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };
            try {
                video.srcObject = await navigator.mediaDevices.getUserMedia(options);
            } catch (err) {
                try {
                    // Фолбек на любую доступную камеру, если режим environment вызвал сбой
                    video.srcObject = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                } catch (e) {
                    return alert('Не удалось получить доступ к камере. Убедитесь, что протокол HTTPS активен.');
                }
            }

            // Ждем инициализации видеопотока, принудительно вызывая проигрывание
            video.setAttribute('playsinline', true);
            video.muted = true;
            video.play().then(() => {
                startScreen.style.display = 'none';
                hints.style.display = 'block';
                progressEl.style.display = 'block';
                recenterBtn.style.display = 'block';

                renderX = canvas.width / 2;
                renderY = canvas.height / 2;

                window.addEventListener('deviceorientation', handleOrientation, true);
                requestAnimationFrame(renderLoop);
            }).catch(e => alert("Ошибка старта видео: " + e));
        });

        // Запуск сборки при нажатии кнопки "Склеить сейчас"
        finishEarlyBtn.addEventListener('click', () => {
            if (currentIndex === 0) return;
            isStitching = true;
            window.removeEventListener('deviceorientation', handleOrientation, true);
            processStitching();
        });

        recenterBtn.addEventListener('click', () => { baseMatrix = null; currentIndex = 0; finishEarlyBtn.style.display = 'none'; });

        // Математика матриц W3C (Z-X'-Y'')
        function getRotationMatrix(alpha, beta, gamma) {
            const degToRad = Math.PI / 180;
            const _x = (beta || 0) * degToRad;
            const _y = (gamma || 0) * degToRad;
            const _z = (alpha || 0) * degToRad;

            const cX = Math.cos(_x), sX = Math.sin(_x);
            const cY = Math.cos(_y), sY = Math.sin(_y);
            const cZ = Math.cos(_z), sZ = Math.sin(_z);

            return [
                cZ * cY - sZ * sX * sY,   -sZ * cX,   cZ * sY + sZ * sX * cY,
                sZ * cY + cZ * sX * sY,    cZ * cX,   sZ * sY - cZ * sX * cY,
                -cX * sY,                  sX,        cX * cY
            ];
        }

        function transpose3x3(m) {
            return [m[0], m[3], m[6], m[1], m[4], m[7], m[2], m[5], m[8]];
        }

        function multiplyMatrixVector(m, v) {
            return [
                m[0]*v[0] + m[1]*v[1] + m[2]*v[2],
                m[3]*v[0] + m[4]*v[1] + m[5]*v[2],
                m[6]*v[0] + m[7]*v[1] + m[8]*v[2]
            ];
        }

        function handleOrientation(event) {
            if (event.alpha === null || event.beta === null || event.gamma === null) return;
            const M = getRotationMatrix(event.alpha, event.beta, event.gamma);

            if (baseMatrix === null) {
                baseMatrix = M;
                targets = [];
                const degToRad = Math.PI / 180;

                sphereLayers.forEach(layer => {
                    const rPitch = layer.pitch * degToRad;
                    const stepAngle = 360 / layer.steps;

                    for (let i = 0; i < layer.steps; i++) {
                        const rYaw = (i * stepAngle) * degToRad;
                        const localX = Math.sin(rYaw) * Math.cos(rPitch);
                        const localY = Math.sin(rPitch);
                        const localZ = -Math.cos(rYaw) * Math.cos(rPitch);

                        const worldVec = multiplyMatrixVector(baseMatrix, [localX, localY, localZ]);
                        targets.push({ worldVector: worldVec, id: targets.length, imageData: null, matrix: null });
                    }
                });
            }
            currentMatrix = M;
        }

        function renderLoop() {
            if (isStitching) return;
            if (!baseMatrix || !currentMatrix) {
                requestAnimationFrame(renderLoop);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Статичный прицел
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(centerX, centerY, 30, 0, Math.PI * 2); ctx.stroke();

            if (currentIndex >= targets.length) {
                isStitching = true;
                window.removeEventListener('deviceorientation', handleOrientation, true);
                processStitching();
                return;
            }

            const currentMatrixInv = transpose3x3(currentMatrix);
            const F = Math.max(canvas.width, canvas.height) * 0.9;

            let activeTargetCoords = null;
            let activeAngularError = 180;

            targets.forEach(target => {
                const local = multiplyMatrixVector(currentMatrixInv, target.worldVector);
                const x = local[0], y = local[1], z = local[2];
                const isBehind = z >= 0;
                const isCaptured = target.id < currentIndex;

                if (!isBehind) {
                    const scrX = centerX + (x / -z) * F;
                    const scrY = centerY - (y / -z) * F;

                    if (scrX >= 0 && scrX <= canvas.width && scrY >= 0 && scrY <= canvas.height) {
                        ctx.beginPath();
                        ctx.fillStyle = isCaptured ? 'rgba(48, 209, 88, 0.6)' : 'rgba(255, 255, 255, 0.25)';
                        ctx.arc(scrX, scrY, isCaptured ? 4 : 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                if (target.id === currentIndex) {
                    activeAngularError = Math.acos(-z / Math.hypot(x, y, z)) * (180 / Math.PI);
                    let scrX, scrY;
                    if (!isBehind) {
                        scrX = centerX + (x / -z) * F;
                        scrY = centerY - (y / -z) * F;
                    } else {
                        const edgeAngle = Math.atan2(y, x);
                        scrX = centerX + Math.cos(edgeAngle) * (centerX * 0.82);
                        scrY = centerY - Math.sin(edgeAngle) * (centerY * 0.82);
                    }
                    activeTargetCoords = { x: scrX, y: scrY, isBehind, x_loc: x, y_loc: y };
                }
            });

            if (activeTargetCoords) {
                const isAligned = activeAngularError < 2.5;

                renderX += (activeTargetCoords.x - renderX) * 0.25;
                renderY += (activeTargetCoords.y - renderY) * 0.25;

                ctx.strokeStyle = isAligned ? '#34c759' : (activeTargetCoords.isBehind ? 'rgba(255, 149, 0, 0.3)' : '#ff9500');
                ctx.lineWidth = isAligned ? 5 : 3;
                ctx.beginPath(); ctx.arc(renderX, renderY, isAligned ? 10 : 18, 0, Math.PI * 2); ctx.stroke();

                if (!isCapturing) {
                    if (isAligned) {
                        hints.innerText = "Замрите...";
                        hints.style.backgroundColor = "#34c759";
                        executeFrameGrab();
                    } else {
                        hints.style.backgroundColor = "rgba(15, 15, 20, 0.85)";
                        if (activeTargetCoords.isBehind) {
                            hints.innerText = "Развернитесь назад 🔄";
                        } else if (Math.abs(activeTargetCoords.x_loc) > Math.abs(activeTargetCoords.y_loc)) {
                            hints.innerText = activeTargetCoords.x_loc > 0 ? "Повернитесь вправо ➡️" : "⬅️ Повернитесь влево";
                        } else {
                            hints.innerText = activeTargetCoords.y_loc > 0 ? "Выше ⬆️" : "Ниже ⬇️";
                        }
                    }
                }
            }

            requestAnimationFrame(renderLoop);
        }

        function executeFrameGrab() {
            isCapturing = true;

            flashEl.style.transition = 'none'; flashEl.style.opacity = '1';

            grabCanvas.width = video.videoWidth || 1280;
            grabCanvas.height = video.videoHeight || 720;
            grabCtx.drawImage(video, 0, 0, grabCanvas.width, grabCanvas.height);
            
            // Фиксируем снимок и текущую точную матрицу гироскопа
            targets[currentIndex].imageData = grabCanvas.toDataURL('image/jpeg', 0.9);
            targets[currentIndex].matrix = [...currentMatrix];

            setTimeout(() => {
                flashEl.style.transition = 'opacity 0.3s ease-out'; flashEl.style.opacity = '0';

                currentIndex++;
                progressEl.innerText = `${currentIndex} / ${targets.length} КАДРОВ`;
                finishEarlyBtn.style.display = 'block'; // Показываем кнопку досрочной склейки

                setTimeout(() => { isCapturing = false; }, 900);
            }, 50);
        }

        // ПРОДВИНУТАЯ СШИВКА (Обратное равнопромежуточное проецирование)
        function processStitching() {
            // Отсекаем только реально сделанные кадры
            const capturedFrames = targets.filter(t => t.imageData !== null);
            if (capturedFrames.length === 0) {
                alert("Не сделано ни одного кадра для склейки.");
                resetSession();
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            progressEl.style.display = 'none';
            recenterBtn.style.display = 'none';
            finishEarlyBtn.style.display = 'none';
            
            hints.innerText = "Подготовка к сшивке...";
            hints.style.backgroundColor = "#ff9500";

            // Разрешение итоговой панорамы (пропорция 2:1)
            const outW = 1600;
            const outH = 800;
            
            const stitchCanvas = document.createElement('canvas');
            stitchCanvas.width = outW; stitchCanvas.height = outH;
            const sCtx = stitchCanvas.getContext('2d');
            const outputBuffer = sCtx.createImageData(outW, outH);

            let loaded = 0;

            // Загружаем растровые данные всех кадров в оперативную память
            capturedFrames.forEach(frame => {
                const img = new Image();
                img.src = frame.imageData;
                img.onload = () => {
                    const c = document.createElement('canvas');
                    c.width = img.width; c.height = img.height;
                    const cx = c.getContext('2d');
                    cx.drawImage(img, 0, 0);
                    
                    frame.pixelData = cx.getImageData(0, 0, c.width, c.height);
                    frame.w = c.width; frame.h = c.h;
                    frame.invM = transpose3x3(frame.matrix);
                    frame.focal = Math.max(c.width, c.height) * 0.85; // Фокусное расстояние объектива

                    loaded++;
                    if (loaded === capturedFrames.length) {
                        runStitchCoreLoop(capturedFrames, outputBuffer, stitchCanvas, sCtx, outW, outH);
                    }
                };
            });
        }

        function runStitchCoreLoop(frames, outputBuffer, stitchCanvas, sCtx, outW, outH) {
            let currentY = 0;
            const data = outputBuffer.data;

            function renderRowsChunk() {
                // Обрабатываем панораму пачками по 25 строк, чтобы не замораживать интерфейс телефона
                const endY = Math.min(currentY + 25, outH);

                for (; currentY < endY; currentY++) {
                    // Перевод координаты Y холста в угол широты (Latitude: от -PI/2 до PI/2)
                    const lat = (currentY / outH) * Math.PI - Math.PI / 2;
                    const cosLat = Math.cos(lat);
                    const sinLat = Math.sin(lat);

                    for (let x = 0; x < outW; x++) {
                        // Перевод координаты X холста в угол долготы (Longitude: от -PI до PI)
                        const lon = (x / outW) * 2 * Math.PI - Math.PI;

                        // Вычисляем 3D-вектор направления луча из центра сферы
                        const wx = cosLat * Math.sin(lon);
                        const wy = sinLat;
                        const wz = -cosLat * Math.cos(lon);

                        let finalR = 0, finalG = 0, finalB = 0;
                        let maxCloseness = -1; 
                        let found = false;

                        // Ищем, в какой из сделанных кадров попадает этот вектор
                        for (let i = 0; i < frames.length; i++) {
                            const f = frames[i];
                            // Умножаем вектор на инвертированную матрицу кадра (перенос в локальное пространство камеры)
                            const lx = f.invM[0]*wx + f.invM[1]*wy + f.invM[2]*wz;
                            const ly = f.invM[3]*wx + f.invM[4]*wy + f.invM[5]*wz;
                            const lz = f.invM[6]*wx + f.invM[7]*wy + f.invM[8]*wz;

                            if (lz < 0) { // Если точка лежит перед объективом
                                // Перспективная проекция на плоскость матрицы камеры
                                const cx = Math.floor(f.w / 2 + (lx / -lz) * f.focal);
                                const cy = Math.floor(f.h / 2 - (ly / -lz) * f.focal);

                                if (cx >= 0 && cx < f.w && cy >= 0 && cy < f.h) {
                                    // Продвинутый весовой критерий: чем ближе луч к оптической оси (-lz близок к 1),
                                    // тем меньше оптических дисторсий. Выбираем лучший пиксель.
                                    if (-lz > maxCloseness) {
                                        maxCloseness = -lz;
                                        const srcIdx = (cy * f.w + cx) * 4;
                                        finalR = f.pixelData.data[srcIdx];
                                        finalG = f.pixelData.data[srcIdx+1];
                                        finalB = f.pixelData.data[srcIdx+2];
                                        found = true;
                                    }
                                }
                            }
                        }

                        const outIdx = (currentY * outW + x) * 4;
                        data[outIdx]   = found ? finalR : 18;  // Если пиксель не снят — красим в темно-серый
                        data[outIdx+1] = found ? finalG : 18;
                        data[outIdx+2] = found ? finalB : 22;
                        data[outIdx+3] = 255;
                    }
                }

                hints.innerText = `Сшивка матрицы: ${Math.floor((currentY / outH) * 100)}%`;

                if (currentY < outH) {
                    setTimeout(renderRowsChunk, 1);
                } else {
                    // Конец сшивки
                    sCtx.putImageData(outputBuffer, 0, 0);
                    
                    // Гасим камеру для экономии заряда батареи
                    if (video.srcObject) {
                        video.srcObject.getTracks().forEach(track => track.stop());
                    }

                    hints.style.display = 'none';
                    outputImage.src = stitchCanvas.toDataURL('image/jpeg', 0.95);
                    resultScreen.style.display = 'flex';
                }
            }

            renderRowsChunk();
        }

        function resetSession() {
            resultScreen.style.display = 'none';
            startScreen.style.display = 'flex';
            baseMatrix = null;
            currentIndex = 0;
            targets = [];
            isStitching = false;
            finishEarlyBtn.style.display = 'none';
        }

        restartBtn.addEventListener('click', resetSession);
    </script>
</body>
</html>
