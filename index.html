<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro 360° Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --neon: #00ffcc;
            --warn: #ff4444;
            --bg: #05070a;
            --panel: rgba(10, 15, 25, 0.85);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: var(--bg); font-family: -apple-system, sans-serif; color: white; }

        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #webcam { display: none; }

        /* UI Слои */
        .ui-layer { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 25px 20px; transition: opacity 0.3s; }
        
        /* Умная подсказка наверху */
        #smart-hint {
            background: var(--panel); backdrop-filter: blur(10px); border-radius: 12px; padding: 12px 20px;
            text-align: center; font-weight: 600; font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: color 0.3s, border-color 0.3s; margin: 0 auto;
        }

        /* Прицел (только для режима съемки) */
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%;
            pointer-events: none; z-index: 5; transition: border-color 0.2s, transform 0.2s;
        }
        #crosshair.ready { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,204,0.4); transform: translate(-50%, -50%) scale(1.1); }
        #crosshair::after { content:''; position:absolute; top:13px; left:13px; width:4px; height:4px; background:white; border-radius:50%; }

        /* Панели управления (Внизу) */
        .controls { pointer-events: auto; display: flex; flex-direction: column; gap: 15px; }
        .row { display: flex; justify-content: center; gap: 15px; align-items: center; }

        .btn {
            background: var(--panel); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 14px 24px;
            border-radius: 12px; font-weight: bold; cursor: pointer; backdrop-filter: blur(10px); flex: 1; text-align: center;
        }
        .btn:active { background: rgba(255,255,255,0.1); }
        
        .btn-primary { background: var(--neon); color: black; border: none; }
        .btn-primary:active { transform: scale(0.96); background: #00cca3; }

        .shutter {
            width: 76px; height: 76px; border-radius: 50%; background: white; border: 6px solid #e2e8f0;
            box-shadow: 0 0 0 4px transparent; transition: all 0.15s; cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
        .shutter.ready { border-color: var(--neon); box-shadow: 0 0 20px rgba(0,255,204,0.4); }
        .shutter:active { transform: scale(0.85); background: var(--neon); }

        /* Экраны */
        #screen-start { position: absolute; width:100%; height:100%; z-index: 100; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; pointer-events: auto; }
        
        .hidden { display: none !important; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="screen-start">
        <h1 style="color: var(--neon); margin-bottom: 15px;">360° Studio</h1>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 40px; font-size: 0.95rem; line-height: 1.5;">
            Интеллектуальная склейка панорам.<br>Система автоматически стабилизирует кадр.
        </p>
        <button class="btn btn-primary" id="btn-init" style="width: 100%; max-width: 300px; padding: 18px; font-size: 1.1rem; border-radius: 30px;">Активировать камеру</button>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <div id="canvas-container"></div>
    <div id="crosshair" class="hidden"></div>

    <div id="ui-capture" class="ui-layer hidden">
        <div id="smart-hint">Анализ сенсоров...</div>
        <div class="controls">
            <div class="row">
                <div class="shutter" id="btn-shoot"></div>
            </div>
            <div class="row" style="margin-top: 10px;">
                <button class="btn" id="btn-to-preview">👁 Предпросмотр</button>
            </div>
        </div>
    </div>

    <div id="ui-preview" class="ui-layer hidden">
        <div id="smart-hint" style="color: var(--neon); border-color: var(--neon);">Режим просмотра (тяните пальцем)</div>
        <div class="controls">
            <div class="row">
                <button class="btn" id="btn-resume">🔙 Вернуться к съемки</button>
                <button class="btn btn-primary" id="btn-export">📥 Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        // Глобальные переменные стейта
        let APP_STATE = 'INIT'; // INIT -> CAPTURE -> PREVIEW
        let scene, camera, renderer, videoTexture;
        let livePreviewMesh;
        let capturedPatches = [];
        
        // Математика и сглаживание
        let targetQuaternion = new THREE.Quaternion(); // То, куда стремится гироскоп
        let isDevicePerfect = false; // Флаг идеального положения для съемки

        // Управление в режиме предпросмотра
        let isDragging = false, prevMouse = { x: 0, y: 0 };
        let previewLon = 0, previewLat = 0;

        const video = document.getElementById('webcam');
        const hintBox = document.getElementById('smart-hint');
        const crosshair = document.getElementById('crosshair');

        // Инициализация
        document.getElementById('btn-init').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                video.srcObject = stream;
                video.play();

                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const perm = await DeviceOrientationEvent.requestPermission();
                    if (perm === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }

                document.getElementById('screen-start').classList.add('hidden');
                switchToCapture();
                initEngine();
            } catch (err) {
                alert("Ошибка доступа. Убедитесь, что открыли сайт по HTTPS. " + err.message);
            }
        });

        // Обработка Гироскопа (Без Gimbal Lock)
        function handleOrientation(e) {
            if (APP_STATE !== 'CAPTURE' || e.alpha === null) return;
            
            // Умные подсказки: проверяем завал горизонта (Beta)
            // Идеальное положение телефона вертикально: beta ~ 90 (плюс-минус 15 градусов)
            if (e.beta < 70) {
                updateHint("Отодвиньте камеру назад (поднимите телефон)", false);
            } else if (e.beta > 110) {
                updateHint("Наклоните телефон вперед", false);
            } else {
                updateHint("✅ Идеальный ракурс, можно снимать", true);
            }

            // Конвертация сенсоров в стабильный Кватернион
            const euler = new THREE.Euler();
            euler.set(THREE.MathUtils.degToRad(e.beta - 90), THREE.MathUtils.degToRad(e.alpha + 180), 0, 'YXZ');
            targetQuaternion.setFromEuler(euler);
        }

        function updateHint(text, isReady) {
            isDevicePerfect = isReady;
            hintBox.innerText = text;
            if (isReady) {
                hintBox.style.color = "var(--neon)";
                hintBox.style.borderColor = "var(--neon)";
                crosshair.classList.add('ready');
                document.getElementById('btn-shoot').classList.add('ready');
            } else {
                hintBox.style.color = "var(--warn)";
                hintBox.style.borderColor = "rgba(255, 68, 68, 0.5)";
                crosshair.classList.remove('ready');
                document.getElementById('btn-shoot').classList.remove('ready');
            }
        }

        function initEngine() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: false }); // preserve отключен для экономии памяти
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Защита от перегруза на 4K экранах
            container.appendChild(renderer.domElement);

            videoTexture = new THREE.VideoTexture(video);
            
            // Создаем живой видоискатель (Экран перед глазами)
            // Размеры подогнаны под FOV камеры смартфона (~ 60x40 градусов)
            const geo = new THREE.SphereGeometry(10, 32, 32, -0.6, 1.2, Math.PI/2 - 0.4, 0.8);
            geo.scale(-1, 1, 1); // Инвертируем внутрь
            const mat = new THREE.MeshBasicMaterial({ map: videoTexture, side: THREE.DoubleSide });
            livePreviewMesh = new THREE.Mesh(geo, mat);
            
            // Привязываем экран к камере намертво
            camera.add(livePreviewMesh);
            scene.add(camera);

            // Обработчики сенсора (мышь/палец) для предпросмотра
            container.addEventListener('pointerdown', e => {
                if (APP_STATE !== 'PREVIEW') return;
                isDragging = true; prevMouse = { x: e.clientX, y: e.clientY };
            });
            container.addEventListener('pointermove', e => {
                if (!isDragging || APP_STATE !== 'PREVIEW') return;
                previewLon += (prevMouse.x - e.clientX) * 0.2;
                previewLat += (e.clientY - prevMouse.y) * 0.2;
                previewLat = Math.max(-85, Math.min(85, previewLat));
                prevMouse = { x: e.clientX, y: e.clientY };
            });
            container.addEventListener('pointerup', () => isDragging = false);
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (APP_STATE === 'CAPTURE') {
                // Плавное следование камеры за сенсором (убирает микро-тряску)
                camera.quaternion.slerp(targetQuaternion, 0.15);
            } else if (APP_STATE === 'PREVIEW') {
                // Управление пальцем
                const phi = THREE.MathUtils.degToRad(90 - previewLat);
                const theta = THREE.MathUtils.degToRad(previewLon);
                const target = new THREE.Vector3( Math.sin(phi)*Math.sin(theta), Math.cos(phi), Math.sin(phi)*Math.cos(theta) );
                camera.lookAt(target);
            }

            renderer.render(scene, camera);
        }

        // --- ЛОГИКА КНОПОК ---

        // 1. СДЕЛАТЬ КАДР
        document.getElementById('btn-shoot').addEventListener('click', () => {
            if (!video.videoWidth) return;

            // Оптимизация памяти: делаем снимок в пониженном разрешении
            const maxRes = 1024;
            const aspect = video.videoWidth / video.videoHeight;
            const cWidth = maxRes; const cHeight = maxRes / aspect;
            
            const canvas = document.createElement('canvas');
            canvas.width = cWidth; canvas.height = cHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, cWidth, cHeight);
            const b64 = canvas.toDataURL('image/jpeg', 0.8); // 80% качество, JPEG легче PNG

            // Создаем "заплатку" на сцене
            const patchTex = new THREE.CanvasTexture(canvas);
            const patchMat = new THREE.MeshBasicMaterial({ map: patchTex, side: THREE.DoubleSide });
            
            // Фикс Z-Fighting: каждый следующий слой делаем чуть-чуть больше в радиусе (отодвигаем от центра)
            // Live Preview висит на радиусе 10. Сшитые куски висят на радиусе 10.1, 10.2, и тд.
            const offsetRadius = 10.1 + (capturedPatches.length * 0.05); 
            const patchGeo = new THREE.SphereGeometry(offsetRadius, 32, 32, -0.6, 1.2, Math.PI/2 - 0.4, 0.8);
            patchGeo.scale(-1, 1, 1);
            
            const patchMesh = new THREE.Mesh(patchGeo, patchMat);
            // Применяем текущий поворот камеры к заплатке в мировых координатах
            camera.getWorldQuaternion(patchMesh.quaternion); 
            scene.add(patchMesh);

            capturedPatches.push({ img: b64, quat: patchMesh.quaternion.toArray(), rad: offsetRadius });

            if(navigator.vibrate) navigator.vibrate(50);
            
            // Визуальный эффект вспышки
            const flash = document.createElement('div');
            flash.style.cssText = "position:absolute;top:0;left:0;width:100%;height:100%;background:white;z-index:99;opacity:1;transition:opacity 0.3s;";
            document.body.appendChild(flash);
            setTimeout(() => flash.style.opacity = '0', 50);
            setTimeout(() => flash.remove(), 350);
        });

        // 2. ПЕРЕХОД В РЕЖИМ ПРЕДПРОСМОТРА
        document.getElementById('btn-to-preview').addEventListener('click', () => {
            APP_STATE = 'PREVIEW';
            document.getElementById('ui-capture').classList.add('hidden');
            document.getElementById('ui-preview').classList.remove('hidden');
            crosshair.classList.add('hidden');
            livePreviewMesh.visible = false; // Прячем живую камеру, чтобы видеть только результат
            
            // Инициализируем стартовую точку для пальца на основе текущего поворота
            const euler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
            previewLon = THREE.MathUtils.radToDeg(euler.y);
            previewLat = Math.max(-85, Math.min(85, 90 - THREE.MathUtils.radToDeg(Math.acos(camera.getWorldDirection(new THREE.Vector3()).y))));
        });

        // 3. ВОЗВРАТ К СЪЕМКЕ
        document.getElementById('btn-resume').addEventListener('click', switchToCapture);

        function switchToCapture() {
            APP_STATE = 'CAPTURE';
            document.getElementById('ui-preview').classList.add('hidden');
            document.getElementById('ui-capture').classList.remove('hidden');
            crosshair.classList.remove('hidden');
            if (livePreviewMesh) livePreviewMesh.visible = true;
        }

        // 4. ЭКСПОРТ ПРОЕКТА
        document.getElementById('btn-export').addEventListener('click', () => {
            if (capturedPatches.length === 0) return alert("Вы не сделали ни одного кадра.");
            
            alert("Подготовка сцены к скачиванию. Пожалуйста, подождите...");
            const viewerHtml = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>360 Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>
<style>body{margin:0;overflow:hidden;background:#000;}</style></head><body>
<script>
    const patches = ${JSON.stringify(capturedPatches)};
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    patches.forEach(p => {
        const tex = new THREE.TextureLoader().load(p.img);
        const geo = new THREE.SphereGeometry(p.rad, 32, 32, -0.6, 1.2, Math.PI/2 - 0.4, 0.8);
        geo.scale(-1,1,1);
        const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({map: tex, side: THREE.DoubleSide}));
        mesh.quaternion.fromArray(p.quat);
        scene.add(mesh);
    });

    let lon=0, lat=0, isDrag=false, pX=0, pY=0;
    window.addEventListener('pointerdown', e => { isDrag=true; pX=e.clientX; pY=e.clientY; });
    window.addEventListener('pointermove', e => { if(isDrag) { lon += (pX-e.clientX)*0.15; lat += (e.clientY-pY)*0.15; lat=Math.max(-85,Math.min(85,lat)); pX=e.clientX; pY=e.clientY; }});
    window.addEventListener('pointerup', () => isDrag=false);
    
    function anim() { requestAnimationFrame(anim);
        const phi=THREE.MathUtils.degToRad(90-lat), theta=THREE.MathUtils.degToRad(lon);
        camera.lookAt(Math.sin(phi)*Math.sin(theta), Math.cos(phi), Math.sin(phi)*Math.cos(theta));
        renderer.render(scene, camera); }
    anim();
<\/script></body></html>`;

            const blob = new Blob([viewerHtml], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my-360-pano.html';
            a.click();
        });
    </script>
</body>
</html>
